services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena_local
      POSTGRES_DB: type_arena
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

volumes:
  pgdata:
